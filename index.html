<!DOCTYPE html>
<html>
<head>
    <title>Bucket List</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #6a11cb, #8e2de2, #c471ed);
            margin: 0;
            padding: 0;
            text-align: center;
            color: white;
        }

        h1 {
            margin-top: 30px;
            font-size: 32px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            color: black;
            width: 350px;
            margin: 30px auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.3);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        input[type="submit"] {
            background: linear-gradient(45deg, #7b2ff7, #f107a3);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        input[type="submit"]:hover {
            opacity: 0.9;
        }

        iframe {
            width: 90%;
            height: 400px;
            border: none;

            border-radius: 12px;
            background: white;
        }
    </style>

</head>
<body>

<h1> Bucket List</h1>

<div class="container">
    <h3>Add New</h3>

    <form action="action.php" method="POST" target="frame">
        <input type="text" name="title" placeholder="Wish name" required><br>
        <input type="date" name="date"><br>
        <input type="submit" name="add" value="Add Wish">
    </form>
</div>

<h3>Your Wishes</h3>

<iframe src="action.php" name="frame"></iframe>

</html>
